name: 每日 Python 脚本

on:
  schedule:
    # 每5分钟跑一次（测试用）
    - cron: '*/5 * * * *'
  workflow_dispatch:   # 允许在网页上手动点按钮触发

jobs:
  run-python:
    runs-on: ubuntu-latest
    environment: Wiki

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行每日脚本
        env:
          AUTHKEY: ${{ secrets.WIKI_AUTHKEY }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
        run: python scripts/daily_task.py
